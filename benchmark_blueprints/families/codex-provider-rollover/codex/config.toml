# Benchmark-local Codex config for the Codex Provider Rollover family.

[model_providers.responses_proxy]
name = "Family Local Responses Proxy"
base_url = "http://127.0.0.1:11434/v1/responses"
env_key = "OPENAI_API_KEY"
wire_api = "responses"
store = true

provider = "responses_proxy"
model = "gpt-5.4"
model_reasoning_effort = "high"
model_verbosity = "low"
approval_policy = "never"
sandbox_mode = "danger-full-access"

# Benchmark guidance:
# - exact follow-up continuity matters more than first-turn success
# - preserve unrelated local tuning keys and comments
