[workflow]
schema_version = "cnb55.workflow_mapping.v1"
entrypoint = "make codex-daily-triage"
workflow_scope = "Triage blocker incidents for the on-call rotation before any general queue cleanup, keep on-call ownership clear, and emit a summary that can feed the response review stand-up."
preferred_output_dir = "artifacts"

[workflow.must_read]
paths = ["Makefile", "docs/ops/daily_triage.md", "ops/automation/triage.cron", "release_context/objective_shift.md", "release_context/release_notes_2026_04.md"]

[automation]
kind = "cron"
schedule_literal = "0 9 * * 1-5"
command = "make codex-daily-triage"
