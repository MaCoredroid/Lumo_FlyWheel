[workflow]
schema_version = "cnb55.workflow_mapping.v1"
entrypoint = "make codex-daily-triage"
workflow_scope = "Run the live daily triage workflow through the current Codex-facing entrypoint and keep the cited workflow files in view before reusing any draft wording."
preferred_output_dir = "artifacts"

[workflow.must_read]
paths = ["Makefile", "docs/ops/daily_triage.md", "ops/automation/triage.cron", "scripts/triage.py", "fixtures/open_incidents.json"]

[automation]
kind = "cron"
schedule_literal = "0 9 * * 1-5"
command = "make codex-daily-triage"
