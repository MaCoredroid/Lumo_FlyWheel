[workflow]
schema_version = "cnb55.workflow_mapping.v1"
entrypoint = "make codex-daily-triage"
workflow_scope = "Blockers-first daily triage for the on-call rotation with stand-up-ready output and no fallback to the broad queue-sweep narrative."
preferred_output_dir = "artifacts"

[workflow.must_read]
paths = ["docs/ops/daily_triage.md", "docs/ops/migration_notes.md", "release_context/objective_shift.md", "release_context/release_notes_2026_04.md"]

[automation]
kind = "cron"
schedule_literal = "0 9 * * 1-5"
command = "make codex-daily-triage"
