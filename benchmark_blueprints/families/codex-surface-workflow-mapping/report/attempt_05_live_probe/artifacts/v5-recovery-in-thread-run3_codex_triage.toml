[workflow]
schema_version = "cnb55.workflow_mapping.v1"
entrypoint = "make codex-daily-triage"
workflow_scope = "Weekday blocker-first daily triage for the on-call rotation, with the live Make target preserved as the canonical operator entrypoint after the rollback."
preferred_output_dir = "artifacts"

[workflow.must_read]
paths = ["Makefile", "docs/ops/daily_triage.md", "docs/ops/migration_notes.md", "release_context/release_notes_2026_04.md", "release_context/objective_shift.md", "incident_context/recovered_plan.md", "incident_context/weekend_rollback.md"]

[automation]
kind = "cron"
schedule_literal = "0 9 * * 1-5"
command = "make codex-daily-triage"
