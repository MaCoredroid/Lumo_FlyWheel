[workflow]
schema_version = "cnb55.workflow_mapping.v1"
entrypoint = "make codex-daily-triage"
workflow_scope = "Codex daily triage for active blocker incidents using the live Make target and active triage script."
preferred_output_dir = "artifacts"

[workflow.must_read]
paths = ["docs/ops/daily_triage.md", "Makefile", "scripts/triage.py", "fixtures/open_incidents.json", ".scenario_variant"]

[automation]
kind = "cron"
schedule_literal = "0 9 * * 1-5"
command = "python3 scripts/triage.py --window active --emit-md reports/daily_triage.md"
