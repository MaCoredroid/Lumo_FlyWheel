[workflow]
schema_version = "cnb55.workflow_mapping.v1"
entrypoint = "make codex-daily-triage"
workflow_scope = "Use the documented Codex daily triage entrypoint and preserve the dirty-state active-window blocker workflow instead of any rollback-only helper path."
preferred_output_dir = "artifacts"

[workflow.must_read]
paths = ["docs/ops/daily_triage.md", "Makefile", "ops/automation/triage.cron", "docs/ops/migration_notes.md", "fixtures/open_incidents.json"]

[automation]
kind = "cron"
schedule_literal = "0 9 * * 1-5"
command = "make codex-daily-triage"
