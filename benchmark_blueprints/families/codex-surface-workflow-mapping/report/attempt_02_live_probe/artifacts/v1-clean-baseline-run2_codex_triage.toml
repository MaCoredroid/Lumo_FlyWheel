[workflow]
schema_version = "cnb55.workflow_mapping.v1"
entrypoint = "make codex-daily-triage"
workflow_scope = "Use the repo's live daily triage entrypoint and keep the clean baseline mapping anchored to the active incident queue rather than rollback-only helpers or legacy schedule notes."
preferred_output_dir = "artifacts"

[workflow.must_read]
paths = ["docs/ops/daily_triage.md", "Makefile", "ops/automation/triage.cron", "scripts/triage.py", "fixtures/open_incidents.json"]

[automation]
kind = "cron"
schedule_literal = "0 9 * * 1-5"
command = "make codex-daily-triage"
