[workflow]
schema_version = "cnb55.workflow_mapping.v1"
entrypoint = "make codex-daily-triage"
workflow_scope = "Run the live daily triage flow for the active incident window, summarize current blocker incidents for the on-call rotation, and keep dirty-state blocker handling tied to the live queue rather than rollback-only helpers or seven-day legacy sweeps."
preferred_output_dir = "artifacts"

[workflow.must_read]
paths = ["docs/ops/daily_triage.md", "Makefile", "docs/ops/migration_notes.md", "ops/automation/triage.cron", "fixtures/open_incidents.json"]

[automation]
kind = "cron"
schedule_literal = "0 9 * * 1-5"
command = "make codex-daily-triage"
