[workflow]
schema_version = "cnb55.workflow_mapping.v1"
entrypoint = "make codex-daily-triage"
workflow_scope = "Triage blocker incidents first for the on-call rotation, then hand the summary to the response review stand-up instead of running a broad queue sweep."
preferred_output_dir = "artifacts"

[workflow.must_read]
paths = ["docs/ops/daily_triage.md", "release_context/objective_shift.md", "release_context/release_notes_2026_04.md", "docs/ops/migration_notes.md", "docs/ops/legacy_schedule.md"]

[automation]
kind = "cron"
schedule_literal = "0 9 * * 1-5"
command = "make codex-daily-triage"
