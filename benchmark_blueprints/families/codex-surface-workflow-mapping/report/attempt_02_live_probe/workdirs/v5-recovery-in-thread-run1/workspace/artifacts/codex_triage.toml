[workflow]
schema_version = "cnb55.workflow_mapping.v1"
entrypoint = "make codex-daily-triage"
workflow_scope = "Run the weekday blocker-first triage workflow for the on-call rotation and emit the summary used by the response review stand-up without expanding back into a general or weekend queue sweep."
preferred_output_dir = "artifacts"

[workflow.must_read]
paths = ["docs/ops/daily_triage.md", "release_context/objective_shift.md", "release_context/release_notes_2026_04.md", "incident_context/recovered_plan.md", "incident_context/weekend_rollback.md"]

[automation]
kind = "cron"
schedule_literal = "0 9 * * 1-5"
command = "make codex-daily-triage"
