[workflow]
schema_version = "cnb55.workflow_mapping.v1"
entrypoint = "make codex-daily-triage"
workflow_scope = "Codex-native config should reuse the live Make target for active blocker triage and preserve the dirty-state focus on current blockers instead of the deprecated legacy sweep."
preferred_output_dir = "artifacts"

[workflow.must_read]
paths = ["Makefile", "docs/ops/daily_triage.md", "docs/ops/migration_notes.md", "ops/automation/triage.cron", "scripts/triage.py", "fixtures/open_incidents.json"]

[automation]
kind = "cron"
schedule_literal = "0 9 * * 1-5"
command = "make codex-daily-triage"
