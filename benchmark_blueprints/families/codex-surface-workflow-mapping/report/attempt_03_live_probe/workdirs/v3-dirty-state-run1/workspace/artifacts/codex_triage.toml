[workflow]
schema_version = "cnb55.workflow_mapping.v1"
entrypoint = "make codex-daily-triage"
workflow_scope = "Codex-native config for the live weekday incident triage flow, aligned to the Make target rather than the rollback-only helper."
preferred_output_dir = "artifacts"

[workflow.must_read]
paths = ["Makefile", "docs/ops/daily_triage.md", "docs/ops/migration_notes.md", "ops/automation/triage.cron", "fixtures/open_incidents.json"]

[automation]
kind = "cron"
schedule_literal = "0 9 * * 1-5"
command = "make codex-daily-triage"
