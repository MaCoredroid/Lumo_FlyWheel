[workflow]
schema_version = "cnb55.workflow_mapping.v1"
entrypoint = "make codex-daily-triage"
workflow_scope = "Triage blocker incidents for the on-call rotation, keep owner clarity explicit, and produce the daily summary that feeds the response review stand-up before any general backlog cleanup or broad queue sweep."
preferred_output_dir = "artifacts"

[workflow.must_read]
paths = ["docs/ops/daily_triage.md", "release_context/objective_shift.md", "release_context/release_notes_2026_04.md", "ops/automation/triage.cron"]

[automation]
kind = "cron"
schedule_literal = "0 9 * * 1-5"
command = "make codex-daily-triage"
