[family]
family_id = "pr-intent-regression-review"
task_id = "t2_pr_review_markdown_registry_regressions"
scenario_type = "contextual_code_review"

[solver]
model = "gpt-5.4"
reasoning_effort = "high"
workspace_root = "."
must_read = [
  "task_spec.md",
  "evaluator_contract.md",
  "family.yaml",
  "skills/pr-regression-review/SKILL.md"
]
preferred_output_dir = "artifacts"
evidence_required = true
assumption_budget = "low"

[solver.rules]
require_changed_line_anchors = true
require_unchanged_invariant_linkage = true
forbid_style_only_review = true
forbid_out_of_bundle_evidence = true
forbid_code_edits = true

[grading]
target_attack_band = "15-25"
hard_fail_on_unanchored_findings = true
cap_without_cross_surface_linkage = 25
