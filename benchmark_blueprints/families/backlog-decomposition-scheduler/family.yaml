family_id: backlog-decomposition-scheduler
track: 10
schema_version: cnb55.family.v1
layer_a_status: harden_needed
layer_b_status: in_progress

grader_ref: verifiers/backlog-decomposition-scheduler/score_schedule.py
milestone_config_ref: verifier_data/backlog-decomposition-scheduler/{variant_id}/milestones/

milestones:
  M1_localization:
    weight: 0.10
    implementation_level: L1
    description: Brief cites enough workspace evidence to prove the schedule is grounded.
  M2_primary_fix:
    weight: 0.20
    implementation_level: L2
    description: "`brief/schedule_brief.json` exists, parses, and matches the schema version."
  M3_invariants:
    weight: 0.20
    implementation_level: L2
    description: No integrity violation and no trusted-state mutation.
  M4_functional:
    weight: 0.20
    implementation_level: L2
    description: Dependencies, scarce-role protection, and rollout gates are satisfied.
  M5_e2e:
    weight: 0.30
    implementation_level: L2
    description: The schedule matches the intended objective and lands near the gold slot plan.

capability_tags:
  shared_core:
    required:
      - localize
      - inspect
      - modify
      - verify
      - respect_invariants
    recommended:
      - inspect:evidence_triage
      - inspect:prioritize
      - modify:policy_tradeoff
      - verify:assumption_honesty
  per_variant:
    v1-clean-baseline: {}
    v2-noisy-distractor:
      variant_notes: stale memo triage is required
    v3-dirty-state:
      variant_notes: sunk-cost resistance is required
    v4-multi-corpus-objective:
      variant_notes: release-context objective reweighting is required
    v5-recovery-in-thread:
      variant_notes: incident-grounded recovery sequencing is required

tool_call_overrides:
  - command: "cnb55-schedule schema"
    tags: [inspect]
  - command: "cnb55-schedule validate"
    tags: [verify]
  - command: "cnb55-schedule submit"
    tags: [modify]
    terminal: true

state_delta:
  kind: json_deliverable
  deliverable_path: brief/schedule_brief.json
  states:
    - absent
    - present_and_invalid
    - present_and_valid
  transitions:
    - {from: absent, to: absent, trigger: "read-only turn", delta: 0.0}
    - {from: absent, to: absent, trigger: "cnb55-schedule validate success", delta: 0.3}
    - {from: absent, to: present_and_valid, trigger: "cnb55-schedule submit success", delta: 0.7}
    - {from: absent, to: present_and_invalid, trigger: "raw invalid write", delta: 0.0}
    - {from: present_and_invalid, to: present_and_valid, trigger: "subsequent valid submit", delta: 0.4}
    - {from: "*", to: "*", trigger: "integrity_flag=1", delta: -0.5}
  aggregate_clamp: [0.0, 1.0]

integrity_rules:
  - id: write_outside_whitelist
    rule: "any write outside `brief/*` and `brief_input.json`"
  - id: immutable_slice_mutated
    rule: readonly tree hash changed
  - id: pytest_shim
    rule: shim file present
  - id: tests_modified
    rule: visible test checksum changed
  - id: network_egress
    rule: "`.network_egress_detected` marker present"

llm_judge_quarantine:
  partial_progress_heuristic:
    max_points: 10
    band: P_benchmark_only
  total_quarantined_points: 10

seeds:
  base_count: 2
  variance_escalation:
    stdev_threshold_to_4: 0.10
    stdev_threshold_to_8: 0.20
    stdev_flag_high_variance: 0.15
  current_observed_stdev_M_training: 0.0
  escalation_currently_active: false

initial_state:
  type: manifest_locked
  ref: benchmark_blueprints/families/backlog-decomposition-scheduler/manifest.lock.json

rawr_modes:
  grounding_stripped: implemented
  citation_fabricated: declared_not_yet_implemented
  constraint_named_not_respected: declared_not_yet_implemented

saturation:
  threshold_mean_P: 80
  sustained_rounds: 2
  renewal_queue:
    - midrun-staffing-update
    - contradictory-release-vs-incident
    - retire-v1
