[family]
family_id = "annotated-mockup-component-port"
task_id = "annotated-mockup-component-port/shared-comparison-card-port"
scenario_type = "frontend_multimodal_component_repair"

[solver]
model = "gpt-5.4"
reasoning_effort = "high"
workspace_root = "."
must_read = ["task_spec.md", "evaluator_contract.md", "skills/mockup-port-fidelity/SKILL.md"]
preferred_output_dir = "artifacts"
evidence_required = true
assumption_budget = "low"

[solver.surfaces]
required = ["multimodal_artifact_inspection", "shell", "apply_patch", "component_tests"]
preferred = ["storybook_or_visual_regression", "downstream_integration_checks", "docs_update"]

[solver.rules]
require_shared_component_patch = true
require_width_and_alt_mode_coverage = true
require_downstream_compatibility_preservation = true
forbid_preview_only_replacement = true
forbid_story_or_docs_only_fix = true
forbid_snapshot_only_fix = true
forbid_verifier_tampering = true

[grading]
target_attack_band = "15-25"
target_score = 20
cap_without_runtime_bundle = 20
cap_without_shared_path_repair = 25
cap_without_dual_mode_verification = 30
cap_without_compatibility_evidence = 25
hard_fail_on_banned_shortcut = true
