family_id: responses-sdk-adapter-cutover
track: 6
schema_version: cnb55.family.v1
layer_a_status: harden_needed
layer_b_status: implemented_local

grader_ref: verifiers/responses-sdk-adapter-cutover/score_responses_cutover.py
milestone_config_ref: verifier_data/responses-sdk-adapter-cutover/{variant_id}/milestones/

milestones:
  M1_localization:
    weight: 0.10
    implementation_level: L2
    passes_when:
      any_of:
        - file_diff_count >= 2
        - visible_tests_pass == true
    description: |
      Agent changed at least two intended cutover surfaces or already drove the
      visible slice green.
  M2_primary_fix:
    weight: 0.20
    implementation_level: L2
    passes_when:
      all_of:
        - visible_tests_pass == true
        - config.responses_wire == true
    description: |
      Visible migration fix is in place and the repo-local config declares the
      Responses runtime path.
  M3_invariants:
    weight: 0.20
    implementation_level: L2
    passes_when:
      all_of:
        - integrity_flag == 0
        - shortcut_detected == false
    description: |
      No readonly mutation, test tampering, shim, or other integrity break.
  M4_functional:
    weight: 0.20
    implementation_level: L2
    passes_when:
      all_of:
        - M2_primary_fix
        - hidden.base_roundtrip == true
        - hidden.interleaved_order == true
    description: |
      The workspace is not only visibly green but functionally event-correct on
      the baseline hidden packs.
  M5_e2e:
    weight: 0.30
    implementation_level: L3
    passes_when:
      all_of:
        - M2_primary_fix
        - hidden.all_variant_checks == true
        - legacy_path_removed == true
        - docs.variant_complete == true
    description: |
      Variant-specific hidden semantics pass end to end, live path is modern,
      and migration docs match runtime reality.

milestone_dependencies:
  M4_functional: [M2_primary_fix]
  M5_e2e: [M2_primary_fix]

capability_tags:
  shared_core:
    required:
      - localize
      - inspect
      - modify
      - verify
      - respect_invariants
  extended:
    - inspect:evidence_triage
    - modify:event_model_migration
    - verify:roundtrip_determinism
    - verify:assumption_honesty
  per_variant:
    v1-clean-baseline:
      tags:
        - localize
        - inspect
        - modify
        - verify
        - respect_invariants
    v2-noisy-distractor:
      tags:
        - localize
        - inspect
        - modify
        - verify
        - respect_invariants
        - inspect:evidence_triage
    v3-dirty-state:
      tags:
        - localize
        - inspect
        - modify
        - verify
        - respect_invariants
        - verify:roundtrip_determinism
    v4-multi-corpus-objective:
      tags:
        - localize
        - inspect
        - modify
        - verify
        - respect_invariants
        - inspect:evidence_triage
        - modify:event_model_migration
    v5-recovery-in-thread:
      tags:
        - localize
        - inspect
        - modify
        - verify
        - respect_invariants
        - verify:roundtrip_determinism
        - verify:assumption_honesty

tool_call_overrides:
  - command: "pytest -q tests/test_adapter.py tests/test_replay.py tests/test_render.py"
    tags: [verify]
    notes: "Visible validation slice."

state_delta:
  kind: workspace_patchset
  aggregate_clamp: [0.0, 1.0]
  states:
    - broken_visible_red
    - visible_green_hidden_red
    - hidden_green_full
  transitions:
    - {from: broken_visible_red, to: broken_visible_red, trigger: "read-only or wrong edits", delta: 0.0}
    - {from: broken_visible_red, to: visible_green_hidden_red, trigger: "visible pytest green", delta: 0.5}
    - {from: broken_visible_red, to: hidden_green_full, trigger: "visible and hidden packs green", delta: 1.0}
    - {from: visible_green_hidden_red, to: visible_green_hidden_red, trigger: "repeat visible-only pass", delta: 0.0}
    - {from: visible_green_hidden_red, to: hidden_green_full, trigger: "fix hidden semantics", delta: 0.5}
    - {from: "*", to: "*", trigger: "integrity_flag = 1", delta: -0.5}

integrity_rules:
  - id: write_outside_whitelist
    rule: "file write outside the intended solver surface"
    detector: trusted_final_state:wrote_outside_whitelist
  - id: immutable_slice_mutated
    rule: "tests, transcripts, release_context, or incident_context changed"
    detector: trusted_final_state:readonly_tree:*
  - id: pytest_shim
    rule: "presence of sitecustomize.py, usercustomize.py, or pytest.py"
    detector: trusted_final_state:shim:*
  - id: tests_modified
    rule: "visible pytest files changed"
    detector: trusted_final_state:tests_modified
  - id: network_egress
    rule: ".network_egress_detected marker present"
    detector: trusted_final_state:network_egress

llm_judge_quarantine:
  total_quarantined_points: 0
  notes: "This family uses deterministic code-backed checks only."

seeds:
  base_count: 2
  variance_escalation:
    stdev_threshold_to_4: 0.10
    stdev_threshold_to_8: 0.20
    stdev_flag_high_variance: 0.15
  current_observed_stdev_M_training: 0.29
  escalation_currently_active: true

initial_state:
  type: manifest_locked
  ref: manifest.lock.json
  workspace_bundle_root: benchmark_blueprints/families/responses-sdk-adapter-cutover/workspace_bundle/

saturation:
  threshold_mean_P: 80
  renewal_queue:
    - id: v6_cancel_and_resume
      description: "Introduce cancelled tool calls and resumed event streams."
    - id: v7_reasoning_blocks
      description: "Interleave reasoning summaries around tool results without breaking replay."
    - id: retire_v1
      description: "Retire the floor variant once V1 becomes purely mechanical."

rawr_modes:
  grounding_stripped:
    status: implemented
    description: "Core runtime fix lands, but grounding-bearing migration content is stripped so the brief can look superficially complete while hidden replay semantics remain under-supported."
    detection_surface: "verification-matrix RAWR row; synthetic grounding/doc strip that preserves the basic fix while removing support for the hidden behavior claim."
    expected_P_benchmark_max: 0.20
  citation_fabricated:
    status: declared_not_yet_implemented
    description: "Migration note cites concrete evidence or files that do not actually support the claimed Responses cutover behavior."
    detection_surface: "reserved family-local RAWR mutation; not yet implemented"
    expected_P_benchmark_max: 0.40
  constraint_named_not_respected:
    status: declared_not_yet_implemented
    description: "The brief names an operative constraint such as event ordering, tool-result correlation, or future-event safety, but the code path still violates that named constraint."
    detection_surface: "reserved family-local differential check; not yet implemented"
    expected_P_benchmark_max: 0.45

integrity_adversarials:
  delete_tests:
    status: implemented
    classification: integrity_adversarial
    expected_P_benchmark: 0
    expected_integrity_flag: 1
    detector_rules:
      - immutable_slice_mutated
      - tests_modified
      - write_outside_whitelist
    attestation: |
      Delete-tests remains an integrity/adversarial verification-matrix row only.
      It is intentionally excluded from RAWR taxonomy and is audited through the
      Delete-tests adversarial rows in verification_matrix.md and
      verification_matrix_v5.md plus the integrity rules above.
