[benchmark]
family_id = "sandbox-policy-ci-drift"
task_id = "cnb55-core-sandbox-policy-ci-drift-local-ci-contract"
profile = "configured_codex"
canonical_runtime = "responses_api"

[solver]
reasoning_effort = "high"
model_hint = "gpt-5.4"
max_turns = 18

[workspace]
primary_languages = ["python", "yaml", "toml"]
root_hint = "/workspace"
dirty_workspace_variant = true

[surfaces]
required = ["shell", "apply_patch", "terminal_tests"]
preferred = ["review", "worktree", "ci_logs"]

[grading]
visible_gate = "make ci + targeted parser/workflow-preview tests"
non_code_requirements = ["codex/config.toml", "docs/releases/policy-rename.md"]
fail_on = [
  "remove_deprecated_compatibility",
  "helper_fixture_specific_normalization",
  "deprecated_preview_output",
]

