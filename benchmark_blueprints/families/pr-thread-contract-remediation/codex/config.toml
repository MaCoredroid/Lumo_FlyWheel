[benchmark]
family_id = "pr-thread-contract-remediation"
task_id = "cnb55-review-pr-thread-contract-remediation"
profile = "configured_codex"
canonical_runtime = "responses_api"

[solver]
reasoning_effort = "high"
model_hint = "gpt-5.4"
max_turns = 18

[workspace]
primary_languages = ["python", "json", "markdown"]
root_hint = "/workspace"
dirty_workspace_variant = true

[surfaces]
required = ["review", "shell", "apply_patch", "terminal_tests"]
preferred = ["diff_inspection"]

[grading]
visible_gate = "python3 -m unittest tests.test_handlers tests.test_service"
non_code_requirements = [
  "docs/release_notes.md",
  "review/reviewer_replies.json",
  "review/verification_note.md",
]
fail_on = [
  "generic_thread_closure",
  "resolved_or_outdated_thread_reply",
  "request_semantics_regression",
]
