[family]
family_id = "pr-thread-contract-remediation"
task_spec = "task_spec.md"
evaluator_contract = "evaluator_contract.md"
benchmark_run = "benchmark_run.md"

[solver]
model = "gpt-5.4"
reasoning_effort = "high"
required_surfaces = ["review", "shell", "apply_patch", "terminal_tests"]
preferred_skill = "skills/review-thread-remediation/SKILL.md"

[scoring]
target_naive_score = 20
max_naive_score = 30

[guardrails]
must_preserve_unrelated_work = true
must_respect_thread_state = true
forbid_generic_thread_closure = true
