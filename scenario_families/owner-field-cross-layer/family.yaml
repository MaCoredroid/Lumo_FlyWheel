family_id: owner-field-cross-layer
scenario_type: cross_layer_changes
description: Thread a new owner field through backend storage, service logic, CLI
  flags, config defaults, and docs. The richer project-board, warehouse-queue,
  and release-gate uplifts also carry hidden routing-key follow-up coverage.
repo_pattern:
  language: python
  framework: pytest
  structure: Small Python repos rooted at /workspace with source files, docs/config,
    and pytest coverage.
  base_image: python:3.12-bookworm@sha256:1e034bf5ce1ca754be43d1491516da937c0fa03fc29b97a8b6a5e1ce7cb8bbf3
breakage_class:
  injection_method: schema_extension
  description: Tests now require an owner field to exist across storage, service,
    CLI, defaults, and docs, but the repo only handles name/status.
  surfaces:
  - store
  - service
  - cli
  - config
  - docs
grading_invariant:
  type: hybrid
  description: Final state is graded by trusted Phase 3 file inspections plus the
    Phase 2 command result. The richer project-board, warehouse-queue, and
    release-gate uplifts additionally run authored hidden-test slices and
    verifier-bundle integrity checks.
  verifier_script: verifiers/owner-field-cross-layer/verify.sh
  functional_checks:
  - id: pytest_suite
    command: >-
      cd /workspace && python -c 'import pathlib, sys; cwd=str(pathlib.Path.cwd());
      sys.path=[p for p in sys.path if p not in ("", cwd)]; import pytest;
      sys.path.insert(0, cwd); raise SystemExit(pytest.main(["-q"]))'
    description: Run the cross-layer owner-field tests
    timeout_seconds: 120
  expected_final_state:
  - store_check: The storage layer persists owner.
  - cli_check: The CLI accepts --owner and passes it through.
  - defaults_check: Default config and docs mention owner.
  - hidden_contract_check: Variants that declare richer verifier assets must satisfy
      the bundled hidden-suite slices and mutation-floor checks in Phase 3.
  - test_suite_check: The pytest suite passes from Phase 2.
milestones:
- id: m1_store_owner_added
  description: Storage layer persists owner
  check_script: verifiers/owner-field-cross-layer/milestones/m1_store_owner_added.sh
  test_nodes: variant_scoped
  pass_rule: all
  partial_credit: 0.25
- id: m2_cli_owner_wired
  description: CLI and service pass through owner
  check_script: verifiers/owner-field-cross-layer/milestones/m2_cli_owner_wired.sh
  test_nodes: variant_scoped
  pass_rule: all
  partial_credit: 0.35
- id: m3_defaults_and_tests
  description: Defaults/docs mention owner and tests pass
  check_script: verifiers/owner-field-cross-layer/milestones/m3_defaults_and_tests.sh
  test_nodes: variant_scoped
  pass_rule: all
  partial_credit: 0.4
shortcut_resistance:
  notes: Phase 3 inspects store, CLI, defaults, and docs directly, checksum manifests
    stop visible-test deletion, and the richer project-board, warehouse-queue,
    and release-gate uplifts also ship hidden routing bundles plus mutation evidence
    covering shortcut fixes that only satisfy the visible owner-field tests.
  known_exploits_tested:
  - Delete the visible owner-field tests
  - Shadow pytest to report success
  - Apply only the visible round-one owner-field fix
  - Normalize separator-heavy queue names only in the CLI path
  - Return a canned picker-backlog payload for the visible fixtures
  - Return a canned patch-train payload for the visible fixtures
  - Preserve the visible owner field while skipping variant-specific routing-key
    canonicalization follow-up work
  min_exploits: 6
  mutation_score_floor: 0.85
difficulty_estimate:
  target_solve_rate: 20-25%
  rationale: Requires coordinated changes across backend, service, CLI, config,
    and docs layers. The richer project-board uplift carries hidden follow-up
    coverage around punctuation-heavy owner labels that must normalize into a
    canonical routing key without mutating the visible owner field, while the
    richer warehouse-queue uplift adds queue-name canonicalization pressure for
    separator-heavy item labels, and the richer release-gate uplift does the
    same for versioned release train labels without mutating the visible train
    name.
  evidence_path: verifier_data/owner-field-cross-layer/project-board/mutation/mutation_report.json
variants:
- variant_id: project-board
  repo_source: authored
  tier: standard
  surfaces:
  - store
  - service
  - cli
  - config
  - docs
  - routing_key
  injected_breakage: Tests now require an owner field to exist across storage, service,
    CLI, defaults, and docs, but the repo only handles name/status. The richer
    project-board uplift also carries hidden follow-up coverage for punctuation-heavy
    owner labels that must normalize into a canonical routing key while preserving
    the original owner text in the visible payload.
  env_dockerfile: variants/project-board/Dockerfile
  base_image_digest: sha256:1e034bf5ce1ca754be43d1491516da937c0fa03fc29b97a8b6a5e1ce7cb8bbf3
  oracle:
    path: oracle/solution.patch
    followup_path: oracle/solution_followup.patch
  hidden_tests:
    path: verifier_data/owner-field-cross-layer/project-board/hidden_tests
    entrypoint: test_example_based.py
    milestone_map:
      m1_store_owner_added:
      - test_example_based.py::test_service_threads_explicit_owner_fields
      - test_example_based.py::test_service_uses_default_owner_when_owner_missing
      m2_cli_owner_wired:
      - test_example_based.py::test_cli_accepts_owner_flag_and_json_contract
      - test_example_based.py::test_routing_key_normalizes_whitespace_only_names
      - test_differential_oracle.py
      - test_property_based.py
      - test_regression_guard.py
      m3_defaults_and_tests:
      - test_followup.py
      - test_mutation_kills.py
  red_team:
    path: verifier_data/owner-field-cross-layer/project-board/red_team
    exploits_required: 6
- variant_id: warehouse-queue
  repo_source: authored
  tier: standard
  surfaces:
