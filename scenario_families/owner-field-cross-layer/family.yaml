  env_dockerfile: variants/warehouse-queue/Dockerfile
  base_image_digest: sha256:1e034bf5ce1ca754be43d1491516da937c0fa03fc29b97a8b6a5e1ce7cb8bbf3
  oracle:
    path: oracle/solution.patch
    followup_path: oracle/solution_followup.patch
  hidden_tests:
    path: verifier_data/owner-field-cross-layer/warehouse-queue/hidden_tests
    entrypoint: test_example_based.py
    milestone_map:
      m1_store_owner_added:
      - test_example_based.py::test_service_threads_explicit_owner_fields
      - test_example_based.py::test_service_uses_default_owner_when_owner_missing
      m2_cli_owner_wired:
      - test_example_based.py::test_cli_accepts_owner_flag_and_json_contract
      - test_example_based.py::test_routing_key_normalizes_whitespace_only_names
      - test_differential_oracle.py
      - test_property_based.py
      - test_regression_guard.py
      m3_defaults_and_tests:
      - test_followup.py
      - test_mutation_kills.py
  red_team:
    path: verifier_data/owner-field-cross-layer/warehouse-queue/red_team
