[workflow]
schema_version = "cnb55.workflow_mapping.v1"
entrypoint = "make codex-daily-triage"
workflow_scope = "Triage blocker incidents for the on-call rotation before any general queue cleanup."
preferred_output_dir = "artifacts"

[workflow.must_read]
paths = ["docs/ops/daily_triage.md", "ops/automation/triage.cron", "fixtures/open_incidents.json", "release_context/objective_shift.md"]

[automation]
kind = "heartbeat"
schedule_literal = "0 9 * * 1-5"
command = "make codex-daily-triage"
